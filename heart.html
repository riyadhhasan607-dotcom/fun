<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Turtle Graphics - Heart</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            background-color: black;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas" width="600" height="600"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        const points = [];
        
        // পাইথনের লুপ: range(0, 360, 2)
        for (let i = 0; i < 360; i += 2) {
            let angle = (i * Math.PI) / 180; // math.radians(i)
            
            // হার্টের সমীকরণ
            let x = 16 * Math.pow(Math.sin(angle), 3);
            let y = 13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle);
            
            // x * 12, y * 12 (পাইথনের মতো স্ক্রিন কোঅর্ডিনেট অ্যাডজাস্টমেন্ট)
            points.push({
                x: centerX + (x * 12),
                y: centerY - (y * 12) 
            });
        }

        let i = 0;
        let j = 1;
        
        // পাইথনের t.color("red")
        ctx.strokeStyle = 'red'; 
        ctx.lineWidth = 0.5; // স্ট্রিং আর্ট সুন্দর দেখানোর জন্য চিকন লাইন

        function draw() {
            // একসাথে কয়েকটি করে লাইন টানবে যেন পাইথনের speed(0) এর মতো দ্রুত ড্রইং হয়
            let linesPerFrame = 20; 
            
            for (let k = 0; k < linesPerFrame; k++) {
                if (i < points.length) {
                    if (j < points.length) {
                        ctx.beginPath();
                        ctx.moveTo(points[i].x, points[i].y); // t.goto(points[i])
                        ctx.lineTo(points[j].x, points[j].y); // t.goto(points[j])
                        ctx.stroke();
                        j++;
                    } else {
                        i++;
                        j = i + 1;
                    }
                } else {
                    return; // ড্রইং শেষ হলে অ্যানিমেশন স্টপ হবে
                }
            }
            
            requestAnimationFrame(draw);
        }

        // অ্যানিমেশন শুরু
        draw();
    </script>
</body>
</html>
